apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: databases.database.example.com
spec:
  # v2: XRs are namespaced. App teams create a Database directly in their
  # namespace (the old claim/DatabaseClaim concept is removed in v2).
  scope: Namespaced
  group: database.example.com
  names:
    kind: Database
    plural: databases
  # No claimNames in v2 (claims unsupported). No connectionSecretKeys either
  # (XR connection secrets unsupported) — the Composition composes a Secret
  # directly into the XR namespace instead.

  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              # Database engine
              engine:
                type: string
                description: Database engine (postgres, mysql, mariadb)
                enum: [postgres, mysql, mariadb]
                default: postgres

              # Instance size (will be translated to cloud-specific class)
              size:
                type: string
                description: Instance size (small, medium, large)
                enum: [small, medium, large]
                default: medium

              # Storage allocation
              storageGB:
                type: integer
                description: Allocated storage in GB
                minimum: 20
                maximum: 1000
                default: 100

              # Backups enabled
              backupsEnabled:
                type: boolean
                description: Enable automated backups
                default: true

              # Multi-AZ for high availability
              multiAZ:
                type: boolean
                description: Enable multi-AZ deployment
                default: false

              # Allow public access (security consideration)
              publiclyAccessible:
                type: boolean
                description: Make database publicly accessible
                default: false

              # Environment tag
              environment:
                type: string
                description: Environment (dev, staging, prod)
                enum: [dev, staging, prod]
                default: dev

            required:
            - engine
            - size

            type: object

          status:
            type: object
            properties:
              # Connection status
              connected:
                type: boolean
                description: Database is reachable and healthy

              # Endpoint for connection
              endpoint:
                type: string
                description: Database endpoint address

              # Port number
              port:
                type: integer
                description: Database port

            type: object

---
# Note: This XRD defines the custom "Database" resource.
# Applications create a namespaced Database (v2); Crossplane provisions via Composition.
#
# Key fields:
# - engine: What database (postgres/mysql/mariadb)
# - size: small/medium/large (Composition will map to AWS class)
# - storageGB: Storage allocation
# - backupsEnabled: Backup configuration
# - multiAZ: High availability
# - publiclyAccessible: Security setting (should be false in prod)
#
# Interview Q: "Why split XRD and Composition?"
# A: Separation of concerns. XRD = contract (what teams need).
#    Composition = implementation (how we provision). Allows multiple
#    compositions for same XRD (AWS + GCP + Azure).
