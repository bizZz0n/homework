apiVersion: database.example.com/v1alpha1
kind: DatabaseClaim
metadata:
  name: my-app-db
  namespace: my-app
spec:
  # Application team specifies what they need
  # No cloud knowledge required
  engine: postgres
  size: large
  storageGB: 100
  backupsEnabled: true
  multiAZ: false
  publiclyAccessible: false
  environment: staging

---
# DEVELOPER EXPERIENCE:
#
# This is what application teams interact with.
# No AWS knowledge, no RDS syntax, no infrastructure details.
#
# Team asks: "We need a database"
# They write this claim and apply it.
# Crossplane provisions the infrastructure.
#
# To verify:
# kubectl get databases
# kubectl get databaseclaims -n my-app
# kubectl describe databaseclaim my-app-db -n my-app
#
# To get connection details (for app to connect):
# kubectl get secret -n crossplane-system <generated-secret-name>
# kubectl get secret -n crossplane-system -o jsonpath='{.items[0].data.endpoint}' | base64 -d
#
# INTERVIEW TALKING POINT:
# "This claim is identical whether you're on AWS, GCP, or Azure.
#  Platform team controls the actual provisioning via Composition.
#  Teams don't need to know which cloud they're on."
