apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: applications
  namespace: argocd
spec:
  # goTemplate: required to read nested git params like {{.path.basename}}
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]

  # Matrix generator: services (git) × environments (list)
  # - git discovers each service dir under applications/*
  # - list fans each service out to dev + staging
  # New service = new dir in applications/, no manifest change needed.
  generators:
  - matrix:
      generators:
      # Service discovery: one element per directory in applications/*
      - git:
          repoURL: https://github.com/bizZz0n/homework.git
          revision: main
          directories:
          - path: task-1-argocd-helm/applications/*
      # Environments applied to every discovered service
      - list:
          elements:
          - env: dev
            namespace: dev
          - env: staging
            namespace: staging

  # Template applied for each (service × env) pair.
  # {{.path.basename}} = service name (e.g. sample-app)
  # {{.path.path}}     = chart path within the repo
  template:
    metadata:
      name: '{{.path.basename}}-{{.env}}'
    spec:
      project: default

      # Git source: chart lives in the discovered service directory
      source:
        repoURL: https://github.com/bizZz0n/homework.git
        targetRevision: main
        path: '{{.path.path}}'

        # Helm configuration: base values + env-specific overrides
        helm:
          releaseName: '{{.path.basename}}-{{.env}}'
          valueFiles:
          - values.yaml              # Base values (all keys defined here)
          - values-{{.env}}.yaml     # Env-specific overrides

      # Target cluster and namespace
      destination:
        server: https://kubernetes.default.svc  # In-cluster
        namespace: '{{.namespace}}'

      # Sync policy: auto-sync on git changes (GitOps!)
      syncPolicy:
        automated:
          prune: true      # Delete resources removed from git
          selfHeal: true   # Correct drift (kubectl apply by hand gets reverted)
        syncOptions:
        - CreateNamespace=true  # Create namespace if missing

      # Revisions: track which git commit is deployed
      revisionHistoryLimit: 10

---
# ApplicationSet generates one Application per (service × env).
# With one service (sample-app), you get:
#   sample-app-dev, sample-app-staging
# Add applications/<new-service>/ (with values.yaml + values-<env>.yaml)
# and the matrix auto-creates <new-service>-dev, <new-service>-staging.
#
# Generators:
# - git (directories): each dir under applications/* becomes a service param
# - list: static environments fanned across every service
# - matrix: cartesian product of the two (services × envs)
#
# Service name is derived from the git path ({{.path.basename}}) and reused
# for the Application name, Helm release name, and chart path.
