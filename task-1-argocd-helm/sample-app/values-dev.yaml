# Development environment overrides
# Merged on top of values.yaml by Helm

replicaCount: 1

image:
  tag: dev-latest

logLevel: debug
logFormat: text

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

env:
  - name: LOG_LEVEL
    value: debug
  - name: ENVIRONMENT
    value: development
  - name: API_ENDPOINT
    value: https://api-dev.example.com
  - name: DEBUG_MODE
    value: "true"

# Dev uses more frequent checks for quick iteration
healthCheck:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 2
