# Example GitHub Actions workflow using the terragrunt-plan-apply composite action
#
# Location: .github/workflows/deploy-infrastructure.yml
#
# This workflow demonstrates how to use the composite action in a real repo.
# Customize the paths, environments, and conditions for your use case.

name: Deploy Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - 'live/**'
      - 'modules/**'
      - '.github/workflows/deploy-infrastructure.yml'

  pull_request:
    branches:
      - main
    paths:
      - 'live/**'
      - 'modules/**'

  workflow_dispatch:  # Allow manual trigger

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.5"
  TG_VERSION: "0.50"

jobs:
  # Plan all infrastructure changes (runs on PR and push)
  plan:
    name: Plan Infrastructure
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Plan Dev VPC
      uses: ./  # Path to composite action
      with:
        path: live/dev/us-east-1/vpc
        env: dev
        aws_region: us-east-1
        terraform_version: ${{ env.TF_VERSION }}
        terragrunt_version: ${{ env.TG_VERSION }}

    - name: Plan Dev EC2
      uses: ./
      with:
        path: live/dev/us-east-1/ec2
        env: dev
        aws_region: us-east-1
        terraform_version: ${{ env.TF_VERSION }}
        terragrunt_version: ${{ env.TG_VERSION }}

  # Deploy to production (only on push to main)
  deploy-prod:
    name: Deploy Production
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    # Require approval for production changes
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy Production VPC
      uses: ./
      with:
        path: live/prod/us-east-1/vpc
        env: prod
        aws_region: us-east-1
        terraform_version: ${{ env.TF_VERSION }}
        terragrunt_version: ${{ env.TG_VERSION }}

    - name: Deploy Production EC2
      uses: ./
      with:
        path: live/prod/us-east-1/ec2
        env: prod
        aws_region: us-east-1
        terraform_version: ${{ env.TF_VERSION }}
        terragrunt_version: ${{ env.TG_VERSION }}

  # Deploy to staging (for testing, optional)
  deploy-staging:
    name: Deploy Staging (Optional)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    environment: staging

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy Staging VPC
      uses: ./
      with:
        path: live/staging/us-east-1/vpc
        env: staging
        aws_region: us-east-1
        terraform_version: ${{ env.TF_VERSION }}
        terragrunt_version: ${{ env.TG_VERSION }}

    - name: Deploy Staging EC2
      uses: ./
      with:
        path: live/staging/us-east-1/ec2
        env: staging
        aws_region: us-east-1
        terraform_version: ${{ env.TF_VERSION }}
        terragrunt_version: ${{ env.TG_VERSION }}

