---
# NOTES:
#
# 1. Event Triggers:
#    - pull_request: Plan only (no apply)
#    - push to main: Plan + apply
#    - workflow_dispatch: Manual trigger (both plan and deploy)
#
# 2. Environment Approvals:
#    GitHub Actions "environment" blocks require approval before deployment.
#    Configure in repo settings: Settings → Environments → production
#
# 3. AWS Authentication:
#    Uses aws-actions/configure-aws-credentials@v4.
#    Configure either:
#    - AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY (long-lived keys)
#    - IAM OIDC role (federated identity, more secure)
#
# 4. Path Filters:
#    Only run workflow if these paths change:
#    - live/ (infrastructure definitions)
#    - modules/ (shared terraform)
#    - .github/workflows/ (workflow itself)
#
# 5. Concurrency:
#    Add to prevent concurrent runs (state locking):
